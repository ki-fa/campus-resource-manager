name: Sync to private repo for vercel deployment

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to private repo
        env:
          TOKEN: ${{ secrets.PAT }}
          DEST: csus-bogar/campus-resource-manager
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add private https://x-access-token:${TOKEN}@github.com/${DEST}.git
          git push private HEAD:main --force
