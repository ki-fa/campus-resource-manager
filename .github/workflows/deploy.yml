name: Coordinated Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    if: github.repository == 'csus-bogar/campus-resource-manager'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Wait for Render to go live
        run: |
          echo "Waiting for Render..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys?limit=1" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['deploy']['status'])")
            echo "Status: $STATUS"
            if [ "$STATUS" = "live" ]; then
              echo "Render is live!"
              exit 0
            fi
            sleep 15
          done
          echo "Timed out waiting for Render"
          exit 1

      - name: Trigger Vercel Deploy
        run: |
          curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
