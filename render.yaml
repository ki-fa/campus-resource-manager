services:
  - type: web
    name: campus-resource-manager-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: campus-resource-manager
      - key: AUTH_TOKEN_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
