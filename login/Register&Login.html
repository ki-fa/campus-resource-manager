<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" sizes="any" href="/squirrel-favicon.svg?v=2" />
    <title>Campus Resource Hub</title>
    <meta
      name="description"
      content="A student-friendly resource hub that makes academic, career, and campus support easier to find."
    />
    <link rel="stylesheet" href="register&login.css">
    
  </head>

  <body>
<!--
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  -->

<!-- Kenji's Register and Login Page HTML -->
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>


<!-- wrapper for both forms -->
<div class="wrapper">

    <!-- sign in form -->
    <div class="form-box login">
        <h1 class="form-title">Sign In</h1>
        <!-- Client-side checks run in script.js; novalidate avoids double messaging with our custom errors -->
        <form id="loginForm" method="post" action="" novalidate>

            <div class="input-box">
                <i class="icon"><ion-icon name="mail"></ion-icon></i>
                <input type="email" name="email" id="loginEmail" placeholder="Email" required>
                <label for="loginEmail">Email</label>
            </div>

            <div class="input-box">  
                <i class="icon"><ion-icon name="lock-closed"></ion-icon></i>
                <input type="password" name="password" id="loginPassword" placeholder="Password" required minlength="8" maxlength="64" autocomplete="current-password">
                <label for="loginPassword">Password</label>
            </div>

            <p class="form-error" id="loginFormError" role="alert" aria-live="polite"></p>

            <input type="submit" class="btn" value="Sign In" name="signIn">

            <div class="links">
                <p>Don't have an account?
                    <button type="button" class="register-link">Sign Up</button>
                </p>
            </div>
        </form>
    </div>

    <!-- Create an account form -->
    <div class="form-box register">
        <h1 class="form-title">Create Account</h1>
        <form id="registerForm" method="post" action="" novalidate>

            <div class="input-box">
                <i class="icon"><img src="squirrel.png" width="16" height="19"></i>
                <input type="text" name="fName" id="fName" placeholder="First Name" required>
                <label for="fName">First Name</label>
            </div>

            <div class="input-box">
                <i class="icon"><img src="squirrel.png" width="16" height="19"></i>
                <input type="text" name="lName" id="lName" placeholder="Last Name" required>
                <label for="lName">Last Name</label>
            </div>

            <div class="input-box">
                <i class="icon"><ion-icon name="mail"></ion-icon></i>
                <input type="email" name="email" id="registerEmail" placeholder="Email" required>
                <label for="registerEmail">Email</label>
            </div>

            <div class="input-box">  
                <i class="icon"><ion-icon name="lock-closed"></ion-icon></i>
                <input type="password" name="password" id="registerPassword" placeholder="Password" required minlength="8" maxlength="64" autocomplete="new-password">
                <label for="registerPassword">Password</label>
            </div>

            <p class="form-error" id="registerFormError" role="alert" aria-live="polite"></p>

            <input type="submit" class="btn" value="Create An Account" name="signUp">

            <div class="links">
                <p>Already have an account?
                    <button type="button" class="login-link">Sign In</button>
                </p>
            </div>
        </form>
    </div>

</div>   

    <script src="script.js"></script>
<!-- End of Kenji's Register and Login Page HTML -->

  </body>
  </html>
